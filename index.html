<style>

  S.cperm='requesting';S.cerr='';R();
  try{
    const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:true});
    S.stream=st;S.cperm='granted';R();
    setTimeout(()=>{const v=document.getElementById('camv');if(v&&S.stream){v.srcObject=S.stream;v.play().catch(()=>{});}},80);
  }catch(e){
    S.cperm='denied';
    const m={NotAllowedError:'Camera access denied. In Safari go to Settings > Safari > Camera and allow access.',NotFoundError:'No camera found on this device.',NotReadableError:'Camera is in use by another app.'};
    S.cerr=m[e.name]||'Camera error: '+(e.message||e.name);R();
  }
}
function stopCam(){if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null;}if(S.rec){clearInterval(S.rtimer);S.rec=false;S.rsec=0;}}
function toggleRec(){
  if(!S.rec){S.rec=true;S.rsec=0;S.rtimer=setInterval(()=>{S.rsec++;R();},1000);toast('🔴 Recording started');}
  else{clearInterval(S.rtimer);const d=fmt(S.rsec);S.rec=false;S.rsec=0;toast('✅ Clip saved · '+d);}R();
}
function goTo(tab){
  if(tab==='camera'&&S.cperm==='unknown')startCam();
  if(S.tab==='camera'&&tab!=='camera')stopCam();
  S.tab=tab;R();
  if(tab==='camera'&&S.cperm==='granted')setTimeout(()=>{const v=document.getElementById('camv');if(v&&S.stream){v.srcObject=S.stream;v.play().catch(()=>{});}},80);
}

function SB(){return `<div class="sb"><span class="sb-t">${nowt()}</span><div class="sb-r"><svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="5" width="2.5" height="6" fill="currentColor" opacity=".4"/><rect x="3.5" y="3" width="2.5" height="8" fill="currentColor" opacity=".6"/><rect x="7" y="1" width="2.5" height="10" fill="currentColor" opacity=".8"/><rect x="10.5" y="0" width="2.5" height="11" fill="currentColor"/></svg><svg width="15" height="11" viewBox="0 0 22 16"><path d="M11 3C7.5 3 4.4 4.4 2.1 6.7L0 4.6C2.8 1.7 6.7 0 11 0s8.2 1.7 10.9 4.6l-2.1 2.1C17.6 4.4 14.5 3 11 3z" fill="currentColor"/><path d="M11 7.5c-2 0-3.8.8-5.1 2.1l-2-2C5.8 5.7 8.3 4.5 11 4.5s5.2 1.2 7.1 3.1l-2 2C14.8 8.3 13 7.5 11 7.5z" fill="currentColor" opacity=".7"/><circle cx="11" cy="13" r="2.5" fill="currentColor"/></svg><div style="display:flex;align-items:center"><div style="width:22px;height:11px;border:1.5px solid currentColor;border-radius:2px;padding:1.5px 2px;display:flex;align-items:center"><div style="width:70%;height:100%;background:currentColor;border-radius:1px"></div></div></div></div></div>`;}

function NAV(){const t=S.tab;const ni=(id,ico,lbl)=>`<div class="ni ${t===id?'on':''}" data-nav="${id}"><div class="ni-i" style="filter:${t===id?'drop-shadow(0 0 4px #E8341A)':'none'}">${ico}</div><div class="ni-l">${lbl}</div></div>`;return `<div class="nav">${ni('home','🏠','Feed')}${ni('map','🗺️','Map')}<button class="nc" data-nav="camera">📷</button>${ni('studio','🎬','Studio')}${ni('profile','👤','Profile')}</div>`;}

function TOAST(){return S.toast?`<div class="toast">✅ ${S.toast}</div>`:'';}

function buildHome(){
  const stories=STORIES.map(s=>`<div class="sw"><div class="sr ${s.s?'seen':''}"><div class="si">${s.i}</div></div><div class="sn">${s.n}</div></div>`).join('');
  const cards=FEED.map(f=>`<div class="card" data-w="${f.id}"><div class="cth"><span style="font-size:68px">${f.e}</span><div class="cov"></div><div class="cbdg"><span class="chip cr">${f.cat}</span>${f.ver?'<span class="chip cg">✓ VERIFIED</span>':''}</div></div><div class="cbdy"><div class="ct">${f.t}</div><div class="cm"><div style="display:flex;align-items:center;gap:6px"><div class="cav">${f.aico}</div><span style="font-family:var(--fb);font-size:12px;color:var(--t2)">${f.au}</span></div><span style="font-family:var(--fm);font-size:11px;color:var(--t3)">${f.ago}</span><span style="font-family:var(--fm);font-size:11px;color:var(--t3);margin-left:auto">👁 ${f.v}</span></div><div class="cact" onclick="event.stopPropagation()"><div class="ca ${S.liked.has(f.id)?'lk':''}" data-lk="${f.id}">${S.liked.has(f.id)?'❤️':'🤍'} Like</div><div class="ca">💬</div><div class="ca">🔗</div><div class="ca" data-w="${f.id}">▶ Watch</div></div></div></div>`).join('');
  return `${SB()}<div class="scroll"><div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px 14px"><div class="logo">True<b>Pulse</b></div><div style="display:flex;gap:10px"><div class="ibt">🔔</div><div class="ibt">⚙️</div></div></div><div class="live" data-w="1"><div class="ldot"></div><div style="flex:1"><div style="font-family:var(--fm);font-size:9px;color:var(--red);letter-spacing:1px;margin-bottom:3px">LIVE NOW</div><div style="font-family:var(--fh);font-size:15px;font-weight:700;color:var(--t1);line-height:1.25">Parliament protest — ground report in progress</div></div><div style="font-family:var(--fm);font-size:10px;color:var(--t2);flex-shrink:0">3.2K watching</div></div><div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px"><div style="font-family:var(--fh);font-size:19px;font-weight:700;color:var(--t1)">Stories</div><div style="font-family:var(--fb);font-size:12px;color:var(--red)">See all</div></div><div class="srow">${stories}</div><div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px"><div style="font-family:var(--fh);font-size:19px;font-weight:700;color:var(--t1)">Latest Reports</div><div style="font-family:var(--fb);font-size:12px;color:var(--red)">Filter</div></div>${cards}<div style="height:8px"></div></div>${NAV()}`;}

function buildCamera(){
  if(S.cperm==='unknown'||S.cperm==='requesting'){return `${SB()}<div class="permwrap"><div style="font-size:62px">📷</div><div style="font-family:var(--fh);font-size:28px;font-weight:800;color:var(--t1)">TruePulse Camera</div><div style="font-family:var(--fb);font-size:14px;color:var(--t2);line-height:1.65;max-width:280px">Camera access is required to record verified news reports with GPS proof metadata.</div>${S.cperm==='requesting'?`<div style="font-family:var(--fm);font-size:13px;color:var(--t2)">⟳ Requesting access…</div>`:`<button class="pbtn" id="pbtn">Enable Camera</button>`}</div>${NAV()}`;}
  if(S.cperm==='denied'){return `${SB()}<div class="permwrap"><div style="font-size:62px">🚫</div><div style="font-family:var(--fh);font-size:28px;font-weight:800;color:var(--t1)">Access Denied</div><div style="font-family:var(--fb);font-size:14px;color:var(--t2);line-height:1.65;max-width:280px">${S.cerr||'Allow camera in Settings > Safari > Camera, then try again.'}</div><button class="pbtn" id="pbtn">Try Again</button></div>${NAV()}`;}
  return `<div class="camwrap"><div class="camvf"><video id="camv" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>${S.dual?`<div class="pip"><video id="pipv" autoplay playsinline muted></video><div class="pipl">FRONT</div></div>`:''}</div><div class="camtop">${S.rec?`<div class="hud rec">● REC ${fmt(S.rsec)}</div>`:''}<div class="hud gps">📍 ${gstr()}</div><div class="hud">🕐 ${nowtsFull()}</div>${S.dual?`<div class="hud dual">⊞ DUAL CAM</div>`:''}</div>${!S.rec?`<div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>`:''}<div class="camctrls"><div class="camrow"><div class="csb btn" id="flipbtn">↔️</div><div class="crb ${S.rec?'rec':''} btn" id="recbtn">${S.rec?`<div class="rsq"></div>`:`<div class="rcirc"></div>`}</div><div class="csb btn ${S.dual?'on':''}" id="dualbtn">⊞</div></div><div class="caminfo"><div class="cdot"></div><span>Camera active</span>${S.dual?'<span>· 2 streams</span>':''}${S.rec?`<span style="color:var(--red)">· ${fmt(S.rsec)}</span>`:''}</div></div></div>${NAV()}`;}

function buildMap(){
  const pins=PINS.map(p=>{const c=PC[p.tp]||'#888';const hide=S.mf!=='ALL'&&p.tp.toUpperCase()!==S.mf;return `<g class="mpin" data-pin="${p.lb}" style="${hide?'display:none':''}"><circle cx="${p.x}" cy="${p.y}" r="20" fill="${c}" opacity=".12" class="${p.tp==='breaking'?'mpulse':''}"/><circle cx="${p.x}" cy="${p.y}" r="11" fill="${c}" opacity=".92"/><circle cx="${p.x}" cy="${p.y}" r="4" fill="white"/>${p.c>1?`<circle cx="${p.x+9}" cy="${p.y-9}" r="9" fill="${c}"/><text x="${p.x+9}" y="${p.y-9}" text-anchor="middle" dominant-baseline="central" font-family="DM Mono" font-size="9" fill="white">${p.c}</text>`:''}</g>`;}).join('');
  const chips=MF.map(f=>`<div class="mfc ${S.mf===f?'on':''}" data-mf="${f}">${f}</div>`).join('');
  const sp=S.selpin?PINS.find(p=>p.lb===S.selpin):null;
  return `${SB()}<div class="mapwrap"><svg style="width:100%;height:100%" viewBox="0 0 380 560" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="380" height="560" fill="#0c1018"/>${Array.from({length:10},(_,i)=>`<line x1="0" y1="${i*56}" x2="380" y2="${i*56}" stroke="#151c26" stroke-width=".7"/>`).join('')}${Array.from({length:8},(_,i)=>`<line x1="${i*54}" y1="0" x2="${i*54}" y2="560" stroke="#151c26" stroke-width=".7"/>`).join('')}<path d="M0,210 Q190,205 380,220" stroke="#1c2535" stroke-width="10" fill="none" stroke-linecap="round"/><path d="M0,310 Q190,305 380,315" stroke="#1c2535" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M125,0 Q130,280 132,560" stroke="#1c2535" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M255,0 Q258,280 262,560" stroke="#1c2535" stroke-width="7" fill="none" stroke-linecap="round"/><circle cx="190" cy="250" r="9" fill="#4DA6FF" opacity=".95"/><circle cx="190" cy="250" r="22" fill="#4DA6FF" opacity=".12" class="mpulse"/><circle cx="190" cy="250" r="3.5" fill="white"/>${pins}</svg><div class="maphd"><div style="font-family:var(--fh);font-size:24px;font-weight:800;color:var(--t1)">Live Map</div><div style="font-family:var(--fm);font-size:10px;color:var(--t2);margin-top:2px">${PINS.length} ACTIVE REPORTS NEARBY</div></div><div class="mapfs">${chips}</div>${sp?`<div class="mapcard"><div style="font-family:var(--fh);font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px">📍 ${sp.lb}</div><div style="font-family:var(--fm);font-size:10px;color:var(--t2)">${sp.c} report${sp.c>1?'s':''} · ${sp.tp.toUpperCase()} · 2m ago</div><div style="display:flex;gap:10px;margin-top:12px">${['Reports:'+sp.c,'Activity:High','Updated:2m'].map(x=>{const[l,v]=x.split(':');return `<div style="flex:1;background:var(--s2);border-radius:12px;padding:10px;border:0.5px solid var(--bd)"><div style="font-family:var(--fm);font-size:18px;color:var(--t1)">${v}</div><div style="font-family:var(--fb);font-size:11px;color:var(--t3);margin-top:2px">${l}</div></div>`;}).join('')}</div></div>`:''}</div>${NAV()}`;}

function buildPlayer(){
  const sigs=[{i:'📍',l:'LOCATION',v:'Jerusalem, IL',st:'ok',s:'✓ Confirmed'},{i:'⏱',l:'TIMESTAMP',v:'11:22 UTC+3',st:'ok',s:'✓ Authentic'},{i:'📷',l:'DUAL CAM',v:'Front + Back',st:'ok',s:'✓ Recorded'},{i:'🔊',l:'AUDIO',v:'Ambient match',st:'wn',s:'⚠ Review'}];
  return `${SB()}<div class="scroll"><div class="plhd"><div class="backbtn btn" id="backbtn">←</div><div style="flex:1"><div style="font-family:var(--fh);font-size:21px;font-weight:800;color:var(--t1)">Verified Report</div><div style="font-family:var(--fm);font-size:10px;color:var(--t2);margin-top:2px">TruePulse · 4m ago · Jerusalem</div></div><div class="ibt">⋯</div></div><div class="vframe"><div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div class="playbig btn" id="bigplay">${S.play?'⏸':'▶'}</div><div style="font-family:var(--fm);font-size:10px;color:var(--t3);letter-spacing:.5px">PARLIAMENT PROTEST · HD · 4:07</div></div></div><div class="vc"><div class="prog" id="progbar"><div class="pf" style="width:${S.prog}%"></div><div class="pth" style="right:${100-S.prog}%"></div></div><div class="vcrow"><div class="vcl"><span style="font-size:18px;cursor:pointer">⏮</span><div class="vcplay btn" id="vcplay">${S.play?'⏸':'▶'}</div><span style="font-size:18px;cursor:pointer">⏭</span></div><span style="font-family:var(--fm);font-size:11px;color:var(--t2)">1:${Math.round(S.prog*2.47).toString().padStart(2,'0')} / 4:07</span><span style="font-size:16px;cursor:pointer;color:var(--t2)">⛶</span></div></div><div class="tsec"><div style="font-family:var(--fh);font-size:17px;font-weight:700;color:var(--t1);margin-bottom:12px">🔍 Truth Signals</div><div class="tgrid">${sigs.map(sg=>`<div class="sig ${sg.st}"><div style="font-size:20px;margin-bottom:2px">${sg.i}</div><div style="font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:.6px">${sg.l}</div><div style="font-family:var(--fb);font-size:12px;font-weight:500;color:var(--t1)">${sg.v}</div><div class="sst ${sg.st}">${sg.s}</div></div>`).join('')}</div></div><div class="pblock"><div class="phd btn" id="drawerbtn"><span style="font-family:var(--fh);font-size:15px;font-weight:700;color:var(--t1)">🔐 Proof Chain</span><span style="color:var(--t2);font-size:16px;display:inline-block;transform:${S.drawer?'rotate(180deg)':'none'}">▾</span></div>${S.drawer?`<div style="border-top:0.5px solid var(--bd);padding:4px 16px 8px">${PROOF.map(p=>`<div class="prow"><span style="font-family:var(--fm);font-size:10px;color:var(--t3)">${p.k}</span><span style="font-family:var(--fm);font-size:${p.h?'9':'10'}px;color:${p.h?'var(--t2)':'var(--t1)'};text-align:right;max-width:56%">${p.v}</span></div>`).join('')}</div>`:''}</div><div style="height:16px"></div></div>${NAV()}`;}

function buildStudio(){
  const bars=Array.from({length:62},(_,i)=>{const h=Math.round(12+Math.abs(Math.sin(i*.38+1)*50)+Math.abs(Math.sin(i*.14)*26));return `<div class="wb" style="height:${Math.min(h,90)}%;width:3.5px;opacity:${(.45+Math.abs(Math.sin(i*.3))*.55).toFixed(2)}"></div>`;}).join('');
  return `${SB()}<div class="scroll"><div class="sthd"><div style="font-family:var(--fh);font-size:24px;font-weight:800;color:var(--t1)">Studio</div><div style="font-family:var(--fm);font-size:10px;color:var(--red);background:var(--red-bg);border:0.5px solid rgba(232,52,26,.3);padding:4px 11px;border-radius:100px">BETA</div></div><div class="prev"><div class="wf">${bars}</div><div class="pvc"><div class="pvb">⏮</div><div class="pvp btn" id="spbtn">${S.splaying?'⏸':'▶'}</div><div class="pvb">⏭</div></div></div><div style="padding:13px 20px 4px;display:flex;justify-content:space-between;align-items:center"><div style="font-family:var(--fh);font-size:18px;font-weight:700;color:var(--t1)">Parliament Protest</div><div style="font-family:var(--fm);font-size:11px;color:var(--t3)">4:07</div></div><div class="tls"><div class="tll">VIDEO TRACK</div><div class="tltr"><div class="tlc tlv" style="width:44%">📹 Main shot</div><div class="tlc tlv" style="width:28%;margin-left:4px">📹 B-roll</div><div class="tlcu"></div></div></div><div class="tls" style="padding-top:4px"><div class="tll">AUDIO TRACK</div><div class="tltr"><div class="tlc tla" style="width:78%">🔊 Ambient audio</div><div class="tlcu"></div></div></div><div class="tls" style="padding-top:4px"><div class="tll">PROOF LAYER</div><div class="tltr"><div class="tlc tlp" style="width:100%">🔐 GPS + Timestamp metadata</div><div class="tlcu"></div></div></div><div class="trow">${[['✂️','Trim'],['🔊','Audio'],['🎨','Filter'],['📝','Caption'],['🔐','Proof'],['↔️','Speed']].map(([i,l])=>`<div class="tch btn"><span>${i}</span>${l}</div>`).join('')}</div><button class="pubbtn btn" id="pubbtn"><span style="font-size:22px">🚀</span><span style="font-family:var(--fh);font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px">PUBLISH REPORT</span></button><div style="height:8px"></div></div>${NAV()}`;}

function buildProfile(){
  return `${SB()}<div class="scroll"><div class="prohero"><div class="proav">👩‍💼</div><div style="font-family:var(--fh);font-size:26px;font-weight:800;color:var(--t1)">Mia Chen</div><div style="font-family:var(--fm);font-size:12px;color:var(--t2)">@miachen_reports</div><span class="chip cg" style="margin-top:2px">✓ Verified Journalist</span><div class="psts">${[['147','Reports'],['24.8K','Followers'],['98%','Accuracy']].map(([v,l])=>`<div class="pst"><div style="font-family:var(--fm);font-size:20px;font-weight:500;color:var(--t1)">${v}</div><div style="font-family:var(--fb);font-size:11px;color:var(--t3)">${l}</div></div>`).join('')}</div></div><div class="trsec"><div class="trt"><span style="font-family:var(--fb);font-size:13px;color:var(--t2)">Trust Score</span><span style="font-family:var(--fm);font-size:13px;color:var(--green)">87 / 100</span></div><div class="trtr"><div class="trfl"></div></div></div><div style="height:0.5px;background:var(--bd);margin:0 20px"></div><div class="setl">${SETS.map(s=>`<div class="seti"><div class="setico">${s.i}</div><div style="flex:1"><div style="font-family:var(--fb);font-size:14px;font-weight:500;color:var(--t1)">${s.t}</div><div style="font-family:var(--fb);font-size:12px;color:var(--t3);margin-top:1px">${s.s}</div></div><div style="color:var(--t3);font-size:16px">›</div></div>`).join('')}</div></div>${NAV()}`;}

function R(){
  const screens={home:buildHome,camera:buildCamera,map:buildMap,player:buildPlayer,studio:buildStudio,profile:buildProfile};
  document.getElementById('ph').innerHTML=`<div class="screen">${(screens[S.tab]||buildHome)()}</div>${TOAST()}`;
  bind();
}

function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>goTo(el.dataset.nav)));
  const pb=document.getElementById('pbtn');if(pb)pb.addEventListener('click',startCam);
  const rb=document.getElementById('recbtn');if(rb)rb.addEventListener('click',toggleRec);
  const fb=document.getElementById('flipbtn');if(fb)fb.addEventListener('click',()=>toast('📷 Camera flipped'));
  const db=document.getElementById('dualbtn');if(db)db.addEventListener('click',()=>{S.dual=!S.dual;toast(S.dual?'⊞ Dual cam on':'Single cam');R();setTimeout(()=>{const v=document.getElementById('camv');if(v&&S.stream){v.srcObject=S.stream;v.play().catch(()=>{});}},80);});
  document.querySelectorAll('[data-w]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.tab='player';R();}));
  document.querySelectorAll('[data-lk]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const id=parseInt(el.dataset.lk);S.liked.has(id)?S.liked.delete(id):(S.liked.add(id),toast('❤️ Liked!'));R();}));
  const bb=document.getElementById('backbtn');if(bb)bb.addEventListener('click',()=>{S.tab='home';R();});
  ['bigplay','vcplay'].forEach(id=>{const b=document.getElementById(id);if(b)b.addEventListener('click',()=>{S.play=!S.play;R();});});
  const pg=document.getElementById('progbar');if(pg)pg.addEventListener('click',e=>{const r=pg.getBoundingClientRect();S.prog=Math.round(((e.clientX-r.left)/r.width)*100);R();});
  const dr=document.getElementById('drawerbtn');if(dr)dr.addEventListener('click',()=>{S.drawer=!S.drawer;R();});
  document.querySelectorAll('.mpin').forEach(el=>el.addEventListener('click',()=>{S.selpin=S.selpin===el.dataset.pin?null:el.dataset.pin;R();}));
  document.querySelectorAll('[data-mf]').forEach(el=>el.addEventListener('click',()=>{S.mf=el.dataset.mf;R();}));
  const sp=document.getElementById('spbtn');if(sp)sp.addEventListener('click',()=>{S.splaying=!S.splaying;R();});
  const pub=document.getElementById('pubbtn');if(pub)pub.addEventListener('click',()=>toast('🚀 Report published!'));
}
R();
</script>
</body>
</html>
